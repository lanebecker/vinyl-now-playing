audio:
  # Run: python -c "import sounddevice; print(sounddevice.query_devices())"
  # to find your USB audio interface device name
  device_name: "USB Audio Codec"
  sample_rate: 44100
  chunk_seconds: 15
  overlap_seconds: 5
  # RMS energy below this = silence (tune to your room noise floor)
  silence_threshold_rms: 0.01
  # Seconds of continuous silence before we consider the session ended
  session_end_silence_seconds: 45

discogs:
  # Get your token at: https://www.discogs.com/settings/developers
  user_token: "YOUR_DISCOGS_TOKEN_HERE"
  username: "your_discogs_username"
  # Must match your custom field name exactly (case-sensitive)
  play_count_field_name: "Play Count"
  # Optional: record today's date in a custom field each time an album completes.
  # Create a "Last Played" custom field in your Discogs collection, then uncomment:
  # last_played_field_name: "Last Played"

display:
  # Default resolution matches Waveshare 7" HDMI LCD (H) — adjust if using a different screen
  width: 1024
  height: 600
  fullscreen: true
  # Dynamic color theming: extracts a 5-color palette from each album's cover art.
  # Background, accent, and text colors shift per record with a 1-second lerp transition.
  # Set to false for a fixed neutral dark theme (useful on low-powered hardware).
  dynamic_theming: true
  cover_art_cache_dir: "src/display/assets/cache"

lastfm:
  # Last.fm scrobbling — records every identified track to your Last.fm history.
  # Requires a free Last.fm API account: https://www.last.fm/api/account/create
  # Run get_lastfm_session_key.py once to generate your session key.
  scrobble_enabled: false
  api_key: "YOUR_LASTFM_API_KEY"
  api_secret: "YOUR_LASTFM_API_SECRET"
  session_key: "YOUR_LASTFM_SESSION_KEY"
  # Optional: mark the last identified track as Loved when a full side completes.
  # Off by default — enable if you want album completions reflected in your Last.fm Loved tracks.
  love_on_completion: false

recognition:
  # Options: "shazamio" | "acrcloud" | "audd"
  backend: "shazamio"
  poll_interval_seconds: 30
  # How many consecutive matching results before we commit a track change
  confirmation_required: 2

  # Only needed if backend is "acrcloud"
  acrcloud:
    access_key: "YOUR_ACRCLOUD_KEY"
    access_secret: "YOUR_ACRCLOUD_SECRET"
    host: "identify-eu-west-1.acrcloud.com"

  # Only needed if backend is "audd"
  audd:
    api_token: "YOUR_AUDD_TOKEN"
